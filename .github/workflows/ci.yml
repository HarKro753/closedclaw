name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify CLI dist output exists
        run: |
          test -f packages/cli/dist/index.js || (echo "packages/cli/dist/index.js not found" && exit 1)
          echo "Build output verified successfully"

  package-dry-run:
    name: Package dry run
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Pack dry run
        run: npm pack --dry-run -w packages/cli

      - name: Verify package contents
        run: |
          npm pack --dry-run -w packages/cli 2>&1 | tee /tmp/pack-output.txt
          grep -q "dist/index.js" /tmp/pack-output.txt || (echo "dist/index.js missing from package" && exit 1)
          grep -q "README.md" /tmp/pack-output.txt || (echo "README.md missing from package" && exit 1)
          echo "Package contents verified"
